<section class="shop-auth shop-auth--forgot">
  <form
    class="shop-auth-panel"
    [formGroup]="forgotForm"
    (ngSubmit)="onSubmit()"
  >
    <div class="shop-auth-head">
      <div class="shop-auth-logo">S</div>
      <p class="shop-auth-badge">Quên mật khẩu</p>
      <p class="shop-auth-subtitle">
        Nhập email đã đăng ký, chúng tôi sẽ gửi link đặt lại mật khẩu.
      </p>
    </div>

    <div class="shop-auth-field">
      <label for="forgot-email">Email</label>
      <input
        id="forgot-email"
        pInputText
        type="email"
        formControlName="email"
        [ngClass]="{
          'ng-invalid ng-dirty':
            forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched,
        }"
      />
      <small
        class="p-error"
        *ngIf="
          forgotForm.get('email')?.invalid && forgotForm.get('email')?.touched
        "
      >
        Email không hợp lệ.
      </small>
    </div>

    <button
      pButton
      type="submit"
      label="Gửi link đặt lại mật khẩu"
      class="shop-auth-submit-btn"
      [loading]="isSubmitting"
      [disabled]="isSubmitting"
    ></button>

    <p
      class="shop-auth-feedback shop-auth-feedback--error"
      *ngIf="errorMessage"
    >
      {{ errorMessage }}
    </p>
    <p
      class="shop-auth-feedback shop-auth-feedback--success"
      *ngIf="successMessage"
    >
      {{ successMessage }}
    </p>

    <p class="shop-auth-footer-text">
      Nhớ mật khẩu?
      <a routerLink="/auth/login" class="shop-auth-link">Đăng nhập</a>
    </p>
  </form>

  <div class="shop-auth-hero">
    <div class="hero-content">
      <h2>Bảo mật tài khoản</h2>
      <p>Chúng tôi sẽ gửi email hướng dẫn đặt lại mật khẩu. Link reset có hiệu lực trong 15 phút.</p>
    </div>
  </div>
</section>
