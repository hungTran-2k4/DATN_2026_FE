<section class="admin-page">
  <header class="page-heading">
    <h3>Quan ly nguoi dung</h3>
    <p>Danh sach tai khoan trong he thong va role hien tai.</p>
  </header>

  <p-table
    [value]="(users$ | async) ?? []"
    [tableStyle]="{ 'min-width': '50rem' }"
    stripedRows
  >
    <ng-template pTemplate="header">
      <tr>
        <th>Email</th>
        <th>Ho ten</th>
        <th>Phone</th>
        <th>Role</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-user>
      <tr>
        <td>{{ user.email || "-" }}</td>
        <td>{{ user.fullName || "-" }}</td>
        <td>{{ user.phoneNumber || "-" }}</td>
        <td>
          <p-tag [value]="formatRoles(user.roles)"></p-tag>
        </td>
      </tr>
    </ng-template>
  </p-table>
</section>
