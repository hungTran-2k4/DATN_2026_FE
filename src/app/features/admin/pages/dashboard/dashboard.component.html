<section class="dashboard">
  <div class="kpi-grid">
    @for (card of kpiCards; track card.title) {
      <p-card>
        <div class="kpi-card">
          <div class="icon-wrap" [style.background]="card.iconBg">
            <i [class]="card.icon"></i>
          </div>
          <div class="content-wrap">
            <h3>{{ card.value }}</h3>
            <p>{{ card.title }}</p>
          </div>
        </div>
      </p-card>
    }
  </div>
</section>
