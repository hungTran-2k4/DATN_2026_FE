<section class="admin-page">
  <header class="page-heading">
    <h3>Quan ly san pham</h3>
    <p>Theo doi danh muc san pham, SKU va trang thai hien thi tren san.</p>
  </header>

  <p-table
    [value]="(products$ | async) ?? []"
    [tableStyle]="{ 'min-width': '50rem' }"
    stripedRows
  >
    <ng-template pTemplate="header">
      <tr>
        <th>Ten san pham</th>
        <th>SKU</th>
        <th>Brand</th>
        <th>Category</th>
        <th>Status</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-product>
      <tr>
        <td>{{ product.name || "-" }}</td>
        <td>{{ product.sku || "-" }}</td>
        <td>{{ product.brandId || "-" }}</td>
        <td>{{ product.categoryId || "-" }}</td>
        <td>{{ product.status || "-" }}</td>
      </tr>
    </ng-template>
  </p-table>
</section>
