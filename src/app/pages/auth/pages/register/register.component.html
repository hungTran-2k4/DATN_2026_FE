<p-toast position="top-right"></p-toast>

<section class="shop-auth">
  <div class="shop-auth-container">
    <form class="shop-auth-panel" [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      <div class="shop-auth-head">
        <h1>Đăng ký</h1>
        <p class="shop-auth-subtitle">Tạo tài khoản mới</p>
      </div>

      <div class="shop-auth-field">
        <label for="register-fullname">Họ tên</label>
        <input
          id="register-fullname"
          pInputText
          type="text"
          formControlName="fullName"
          class="auth-input"
          placeholder="Nhập họ và tên"
          [ngClass]="{
            'ng-invalid ng-dirty':
              getControl('fullName')?.invalid &&
              (getControl('fullName')?.touched || submitted)
          }"
        />
        <small class="p-error" *ngIf="getControl('fullName')?.invalid && (getControl('fullName')?.touched || submitted)">
          {{ getFullNameError() }}
        </small>
      </div>

      <div class="shop-auth-field">
        <label for="register-email">Email</label>
        <input
          id="register-email"
          pInputText
          type="email"
          formControlName="email"
          class="auth-input"
          placeholder="Ví dụ: hotro@gmail.com"
          [ngClass]="{
            'ng-invalid ng-dirty':
              getControl('email')?.invalid &&
              (getControl('email')?.touched || submitted)
          }"
        />
        <small class="p-error" *ngIf="getControl('email')?.invalid && (getControl('email')?.touched || submitted)">
          {{ getEmailError() }}
        </small>
      </div>

      <div class="shop-auth-field">
        <label for="register-password">Mật khẩu</label>
        <input
          id="register-password"
          pInputText
          type="password"
          formControlName="password"
          class="auth-input"
          placeholder="Nhập tối thiểu 6 ký tự"
          [ngClass]="{
            'ng-invalid ng-dirty':
              getControl('password')?.invalid &&
              (getControl('password')?.touched || submitted)
          }"
        />
        <small class="p-error" *ngIf="getControl('password')?.invalid && (getControl('password')?.touched || submitted)">
          {{ getPasswordError() }}
        </small>
      </div>

      <div class="shop-auth-terms-row">
        <p-checkbox formControlName="acceptedTerms" [binary]="true" inputId="register-terms"></p-checkbox>
        <div>
          <label for="register-terms" [ngClass]="{'p-error': getControl('acceptedTerms')?.invalid && (getControl('acceptedTerms')?.touched || submitted)}">
            Tôi đồng ý điều khoản sử dụng và chính sách.
          </label>
          <div *ngIf="getControl('acceptedTerms')?.invalid && (getControl('acceptedTerms')?.touched || submitted)">
             <small class="p-error">Bạn cần đồng ý điều khoản để tiếp tục.</small>
          </div>
        </div>
      </div>

      <button
        pButton
        type="submit"
        class="shop-auth-primary-btn"
        [label]="isSubmitting ? 'Đang xử lý...' : 'Đăng ký ngay'"
        [disabled]="isSubmitting"
      ></button>

      <div class="shop-auth-actions" style="display: flex; justify-content: center;">
        <span class="shop-auth-subtitle" style="font-size: 0.85rem">Đã có tài khoản? <a routerLink="/auth/login" class="shop-auth-link">Đăng nhập</a></span>
      </div>

      <div class="shop-auth-divider"><span>Hoặc tiếp tục với</span></div>

      <div class="shop-auth-social-row">
        <button pButton type="button" class="shop-auth-social-btn" [outlined]="true">
          <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" style="width: 18px; margin-right: 8px; object-fit: contain" alt="Google"> Google
        </button>
        <button pButton type="button" class="shop-auth-social-btn" [outlined]="true">
          <i class="pi pi-facebook" style="color: #1877F2; font-size: 1.1rem; margin-right: 8px"></i> Facebook
        </button>
      </div>
    </form>
  </div>
</section>
