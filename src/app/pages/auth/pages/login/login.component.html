<p-toast position="top-right"></p-toast>

<section class="shop-auth">
  <div class="shop-auth-container">
    <form class="shop-auth-panel" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="shop-auth-head">
        <h1>Đăng nhập</h1>
        <p class="shop-auth-subtitle">Chào mừng quay trở lại hệ thống.</p>
      </div>

      <div class="shop-auth-field">
        <label for="login-email">Email</label>
        <input
          id="login-email"
          pInputText
          type="email"
          formControlName="email"
          class="auth-input"
          placeholder="Nhập email của bạn"
          [ngClass]="{
            'ng-invalid ng-dirty':
              getControl('email')?.invalid &&
              (getControl('email')?.touched || submitted)
          }"
        />
        <small class="p-error" *ngIf="getControl('email')?.invalid && (getControl('email')?.touched || submitted)">
          {{ getEmailError() }}
        </small>
      </div>

      <div class="shop-auth-field">
        <label for="login-password">Mật khẩu</label>
        <input
          id="login-password"
          pInputText
          type="password"
          formControlName="password"
          class="auth-input"
          placeholder="Nhập mật khẩu"
          [ngClass]="{
            'ng-invalid ng-dirty':
              getControl('password')?.invalid &&
              (getControl('password')?.touched || submitted)
          }"
        />
        <small class="p-error" *ngIf="getControl('password')?.invalid && (getControl('password')?.touched || submitted)">
          {{ getPasswordError() }}
        </small>
        
        <div class="shop-auth-row-between" style="margin-top: 6px;">
            <div style="display: flex; gap: 8px; align-items: center;">
                <p-checkbox formControlName="rememberMe" [binary]="true" inputId="remember-me"></p-checkbox>
                <label for="remember-me" class="shop-auth-checkbox-label">Ghi nhớ</label>
            </div>
            <a routerLink="/auth/forgot-password" class="shop-auth-link">Quên mật khẩu?</a>
        </div>
      </div>

      <button
        pButton
        type="submit"
        class="shop-auth-primary-btn"
        [label]="isSubmitting ? 'Đang xử lý...' : 'Đăng nhập'"
        [disabled]="isSubmitting"
      ></button>

      <div class="shop-auth-actions" style="display: flex; justify-content: center; margin-top: -2px;">
        <span class="shop-auth-subtitle" style="font-size: 0.85rem">Chưa có tài khoản? <a routerLink="/auth/register" class="shop-auth-link">Đăng ký ngay</a></span>
      </div>

      <div class="shop-auth-divider"><span>Hoặc tiếp tục với</span></div>

      <div class="shop-auth-social-row">
        <button pButton type="button" class="shop-auth-social-btn" [outlined]="true">
          <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png" style="width: 18px; margin-right: 8px; object-fit: contain" alt="Google"> Google
        </button>
        <button pButton type="button" class="shop-auth-social-btn" [outlined]="true">
          <i class="pi pi-facebook" style="color: #1877F2; font-size: 1.1rem; margin-right: 8px"></i> Facebook
        </button>
      </div>
    </form>
  </div>
</section>
