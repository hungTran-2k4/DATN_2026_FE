<p-toast position="top-right"></p-toast>

<section class="shop-auth">
  <div class="shop-auth-container">
    <form
      class="shop-auth-panel"
      [formGroup]="loginForm"
      (ngSubmit)="onSubmit()"
    >
      <div class="shop-auth-head">
        <div style="display: flex; justify-content: center; margin-bottom: 1.5rem">
          <img ngSrc="/images/logo-brand.png" width="180" height="60" alt="Vora Logo" class="h-12 w-auto">
        </div>
        <h1>Đăng nhập</h1>
        <p class="shop-auth-subtitle">Chào mừng quay trở lại hệ thống.</p>
      </div>

      <!-- Add Error Banner here -->
      <!-- <div
        *ngIf="errorMessage"
        style="
          background-color: #fee2e2;
          border: 1px solid #fca5a5;
          color: #b91c1c;
          padding: 12px 16px;
          border-radius: 6px;
          font-size: 0.9rem;
          display: flex;
          align-items: center;
          gap: 8px;
        "
      >
        <i class="pi pi-exclamation-triangle" style="font-size: 1.2rem"></i>
        <span>{{ errorMessage }}</span>
      </div> -->

      <div class="shop-auth-field">
        <label for="login-email">Email</label>
        <input
          id="login-email"
          pInputText
          type="email"
          formControlName="email"
          class="auth-input"
          placeholder="Nhập email của bạn"
          [ngClass]="{
            'ng-invalid ng-dirty':
              getControl('email')?.invalid &&
              (getControl('email')?.touched || submitted),
          }"
        />
        <small
          class="p-error"
          *ngIf="
            getControl('email')?.invalid &&
            (getControl('email')?.touched || submitted)
          "
        >
          {{ getEmailError() }}
        </small>
      </div>

      <div class="shop-auth-field">
        <label for="login-password">Mật khẩu</label>
        <input
          id="login-password"
          pInputText
          type="password"
          formControlName="password"
          class="auth-input"
          placeholder="Nhập mật khẩu"
          [ngClass]="{
            'ng-invalid ng-dirty':
              getControl('password')?.invalid &&
              (getControl('password')?.touched || submitted),
          }"
        />
        <small
          class="p-error"
          *ngIf="
            getControl('password')?.invalid &&
            (getControl('password')?.touched || submitted)
          "
        >
          {{ getPasswordError() }}
        </small>

        <div class="shop-auth-row-between" style="margin-top: 6px">
          <div style="display: flex; gap: 8px; align-items: center">
            <p-checkbox
              formControlName="rememberMe"
              [binary]="true"
              inputId="remember-me"
            ></p-checkbox>
            <label for="remember-me" class="shop-auth-checkbox-label"
              >Ghi nhớ</label
            >
          </div>
          <a routerLink="/auth/forgot-password" class="shop-auth-link"
            >Quên mật khẩu?</a
          >
        </div>
      </div>

      <button
        pButton
        type="submit"
        class="shop-auth-primary-btn"
        [label]="isSubmitting ? 'Đang xử lý...' : 'Đăng nhập'"
        [disabled]="isSubmitting"
      ></button>

      <div
        class="shop-auth-actions"
        style="display: flex; justify-content: center; margin-top: -2px"
      >
        <span class="shop-auth-subtitle" style="font-size: 0.85rem"
          >Chưa có tài khoản?
          <a routerLink="/auth/register" class="shop-auth-link"
            >Đăng ký ngay</a
          ></span
        >
      </div>

      <div class="shop-auth-divider"><span>Hoặc tiếp tục với</span></div>

      <div class="shop-auth-social-row">
        <button
          pButton
          type="button"
          class="shop-auth-social-btn"
          [outlined]="true"
        >
          <img
            ngSrc="https://cdn-icons-png.flaticon.com/512/2991/2991148.png"
            width="18"
            height="18"
            style="margin-right: 8px; object-fit: contain"
            alt="Google"
          />
          Google
        </button>
        <button
          pButton
          type="button"
          class="shop-auth-social-btn"
          [outlined]="true"
        >
          <i
            class="pi pi-facebook"
            style="color: #1877f2; font-size: 1.1rem; margin-right: 8px"
          ></i>
          Facebook
        </button>
      </div>
    </form>
  </div>
</section>
