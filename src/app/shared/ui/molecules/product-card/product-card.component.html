<a
  [routerLink]="['/product', data.id]"
  class="product-card group"
  [ngClass]="{
    'grid-card': viewMode === 'grid',
    'list-card': viewMode === 'list'
  }"
>
  <!-- ── Image Section ── -->
  <div class="image-wrapper">
    <!-- Main Image -->
    <div class="img-container">
      <img
        [src]="data.image"
        [alt]="data.name"
        class="product-img"
        onerror="this.src='https://placehold.co/400x400/f3f4f6/9ca3af?text=No+Image'"
      />
    </div>
  </div>

  <!-- ── Content Section ── -->
  <div class="content-wrapper">
    <!-- Title -->
    <h3 class="product-title" [title]="data.name">
      {{ data.name }}
    </h3>

    <!-- Rating -->
    <div class="rating-stars">
      <i class="pi pi-star-fill" *ngFor="let i of [1,2,3,4,5]"></i>
    </div>

    <!-- Pricing Section -->
    <div class="price-section">
      <div class="current-price">{{ formatPrice(data.price) }}</div>
      <div class="discount-row" *ngIf="data.originalPrice && data.originalPrice > data.price">
        <span class="discount-percent">-{{ data.discount || 0 }}%</span>
        <span class="original-price">{{ formatPrice(data.originalPrice) }}</span>
      </div>
    </div>
  </div>
</a>
