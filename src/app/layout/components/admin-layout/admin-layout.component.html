<div class="admin-shell">
  <aside class="sidebar">
    <div class="brand">
      <h1>Admin Console</h1>
      <p>He thong quan tri san da nguoi ban</p>
    </div>

    <nav class="menu">
      @for (item of navItems; track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="is-active"
          class="menu-item"
        >
          <i [class]="item.icon"></i>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>
  </aside>

  <main class="main-content">
    <header class="topbar">
      <div>
        <h2>Admin</h2>
        <p>Quan ly he thong tu mot giao dien tap trung</p>
      </div>
    </header>

    <section class="page-body">
      <router-outlet></router-outlet>
    </section>
  </main>
</div>
